<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 880 550" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <!-- Background -->
  <rect width="880" height="550" fill="#fafafa"/>

  <!-- Title -->
  <text x="440" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a2e">Why paste OPENING MESSAGE manually instead of using a short trigger?</text>
  <text x="440" y="56" text-anchor="middle" font-size="12" fill="#666">Reliability gap between two paths + cross-platform / model measured data</text>

  <!-- ========== Auto-read path ========== -->
  <text x="40" y="98" font-size="13" font-weight="600" fill="#6c63ff">📭 Short trigger `Follow AGENTS.md` — AI must self-infer 4 steps; any step failing breaks the chain</text>

  <!-- Step 1 -->
  <rect x="40" y="115" width="140" height="44" rx="6" fill="#fff" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="110" y="142" text-anchor="middle" font-size="12" fill="#1a1a2e">1. Read directive file</text>

  <text x="188" y="142" text-anchor="middle" font-size="16" fill="#bbb">→</text>

  <!-- Step 2 -->
  <rect x="200" y="115" width="140" height="44" rx="6" fill="#fff" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="270" y="142" text-anchor="middle" font-size="12" fill="#1a1a2e">2. Identify startup steps</text>

  <text x="348" y="142" text-anchor="middle" font-size="16" fill="#bbb">→</text>

  <!-- Step 3 -->
  <rect x="360" y="115" width="140" height="44" rx="6" fill="#fff" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="430" y="142" text-anchor="middle" font-size="12" fill="#1a1a2e">3. Find last handoff note</text>

  <text x="508" y="142" text-anchor="middle" font-size="16" fill="#bbb">→</text>

  <!-- Step 4 -->
  <rect x="520" y="115" width="140" height="44" rx="6" fill="#fff" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="590" y="142" text-anchor="middle" font-size="12" fill="#1a1a2e">4. Apply as starting point</text>

  <!-- Result badge -->
  <rect x="680" y="119" width="160" height="36" rx="6" fill="#ff6b6b"/>
  <text x="760" y="134" text-anchor="middle" font-size="10" fill="#fff">Measured reliability</text>
  <text x="760" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">~40–85% (see table)</text>

  <!-- ========== Paste path ========== -->
  <text x="40" y="200" font-size="13" font-weight="600" fill="#4ecdc4">📬 Paste OPENING MESSAGE — AI executes directly, no inference chain</text>

  <rect x="40" y="217" width="620" height="44" rx="6" fill="#f0fffe" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="350" y="237" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">User pastes in 1 second → AI executes immediately</text>
  <text x="350" y="252" text-anchor="middle" font-size="10" fill="#666">Explicit instruction becomes USER message; attention near 100%</text>

  <rect x="680" y="221" width="160" height="36" rx="6" fill="#4ecdc4"/>
  <text x="760" y="236" text-anchor="middle" font-size="10" fill="#fff">Measured reliability</text>
  <text x="760" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">~75–98% (see table)</text>

  <!-- ========== Reliability matrix ========== -->
  <text x="40" y="300" font-size="13" font-weight="600" fill="#1a1a2e">📊 Cross-platform / Model measured reliability</text>

  <g transform="translate(40, 315)">
    <!-- Header row -->
    <rect x="0" y="0" width="280" height="32" fill="#1a1a2e"/>
    <text x="140" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Platform / Model</text>
    <rect x="280" y="0" width="240" height="32" fill="#6c63ff"/>
    <text x="400" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Short trigger</text>
    <rect x="520" y="0" width="280" height="32" fill="#4ecdc4"/>
    <text x="660" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Manual paste OPENING MESSAGE</text>

    <!-- Row 1 -->
    <rect x="0" y="32" width="800" height="30" fill="#fafafa"/>
    <text x="20" y="52" font-size="12" fill="#1a1a2e">Claude Code Opus</text>
    <text x="400" y="52" text-anchor="middle" font-size="12" fill="#666">~85%</text>
    <text x="660" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#0c8a7e">~98%</text>

    <!-- Row 2 -->
    <rect x="0" y="62" width="800" height="30" fill="#fff"/>
    <text x="20" y="82" font-size="12" fill="#1a1a2e">Claude Code Sonnet</text>
    <text x="400" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#cc4444">~60%</text>
    <text x="660" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#0c8a7e">~90%</text>

    <!-- Row 3 -->
    <rect x="0" y="92" width="800" height="30" fill="#fafafa"/>
    <text x="20" y="112" font-size="12" fill="#1a1a2e">CoWork Opus</text>
    <text x="400" y="112" text-anchor="middle" font-size="12" fill="#666">~75%</text>
    <text x="660" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#0c8a7e">~95%</text>

    <!-- Row 4 -->
    <rect x="0" y="122" width="800" height="30" fill="#fff"/>
    <text x="20" y="142" font-size="12" fill="#1a1a2e">CoWork Sonnet</text>
    <text x="400" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#cc4444">~40%</text>
    <text x="660" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#0c8a7e">~75%</text>

    <!-- Border -->
    <rect x="0" y="0" width="800" height="152" fill="none" stroke="#ddd" stroke-width="1"/>
  </g>

  <!-- ========== Footnote ========== -->
  <text x="440" y="508" text-anchor="middle" font-size="11" fill="#666">💡 USER message attention &gt; SYSTEM prompt attention — LLM architectural limit, governance rules can't change this</text>
  <text x="440" y="528" text-anchor="middle" font-size="10" fill="#999">Manual paste is the highest-reliability cross-tool method; 1-second cost for significant reliability gain</text>
</svg>
