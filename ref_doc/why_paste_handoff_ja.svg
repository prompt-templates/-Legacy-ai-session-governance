<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 880 550" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo','Noto Sans CJK JP',sans-serif">
  <!-- Background -->
  <rect width="880" height="550" fill="#fafafa"/>

  <!-- Title -->
  <text x="440" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a2e">なぜ短い指示ではなく OPENING MESSAGE を手動で貼り付けるのか？</text>
  <text x="440" y="56" text-anchor="middle" font-size="12" fill="#666">2 つの経路の信頼性ギャップ + プラットフォーム / モデル別実測データ</text>

  <!-- ========== Auto-read path ========== -->
  <text x="40" y="98" font-size="13" font-weight="600" fill="#6c63ff">📭 短い指示 `Follow AGENTS.md` — AI は 4 ステップを自己推論、いずれかのステップが失敗すれば全体崩壊</text>

  <!-- Step 1 -->
  <rect x="40" y="115" width="140" height="44" rx="6" fill="#fff" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="110" y="142" text-anchor="middle" font-size="12" fill="#1a1a2e">1. 指示ファイルを読む</text>

  <text x="188" y="142" text-anchor="middle" font-size="16" fill="#bbb">→</text>

  <!-- Step 2 -->
  <rect x="200" y="115" width="140" height="44" rx="6" fill="#fff" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="270" y="142" text-anchor="middle" font-size="12" fill="#1a1a2e">2. 起動手順を識別</text>

  <text x="348" y="142" text-anchor="middle" font-size="16" fill="#bbb">→</text>

  <!-- Step 3 -->
  <rect x="360" y="115" width="140" height="44" rx="6" fill="#fff" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="430" y="142" text-anchor="middle" font-size="12" fill="#1a1a2e">3. 前回の引き継ぎメモを探す</text>

  <text x="508" y="142" text-anchor="middle" font-size="16" fill="#bbb">→</text>

  <!-- Step 4 -->
  <rect x="520" y="115" width="140" height="44" rx="6" fill="#fff" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="590" y="142" text-anchor="middle" font-size="12" fill="#1a1a2e">4. 起点として適用</text>

  <!-- Result badge -->
  <rect x="680" y="119" width="160" height="36" rx="6" fill="#ff6b6b"/>
  <text x="760" y="134" text-anchor="middle" font-size="10" fill="#fff">実測信頼性</text>
  <text x="760" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">~40–85%（下表参照）</text>

  <!-- ========== Paste path ========== -->
  <text x="40" y="200" font-size="13" font-weight="600" fill="#4ecdc4">📬 OPENING MESSAGE を手動貼り付け — AI が直接実行、推論連鎖なし</text>

  <rect x="40" y="217" width="620" height="44" rx="6" fill="#f0fffe" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="350" y="237" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">ユーザーが 1 秒で貼り付け → AI は直ちに実行</text>
  <text x="350" y="252" text-anchor="middle" font-size="10" fill="#666">明示的指示が USER message となり、attention はほぼ 100%</text>

  <rect x="680" y="221" width="160" height="36" rx="6" fill="#4ecdc4"/>
  <text x="760" y="236" text-anchor="middle" font-size="10" fill="#fff">実測信頼性</text>
  <text x="760" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">~75–98%（下表参照）</text>

  <!-- ========== Reliability matrix ========== -->
  <text x="40" y="300" font-size="13" font-weight="600" fill="#1a1a2e">📊 プラットフォーム / モデル別実測信頼性</text>

  <g transform="translate(40, 315)">
    <!-- Header row -->
    <rect x="0" y="0" width="280" height="32" fill="#1a1a2e"/>
    <text x="140" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">プラットフォーム / モデル</text>
    <rect x="280" y="0" width="240" height="32" fill="#6c63ff"/>
    <text x="400" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">短い指示</text>
    <rect x="520" y="0" width="280" height="32" fill="#4ecdc4"/>
    <text x="660" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">OPENING MESSAGE 手動貼り付け</text>

    <!-- Row 1 -->
    <rect x="0" y="32" width="800" height="30" fill="#fafafa"/>
    <text x="20" y="52" font-size="12" fill="#1a1a2e">Claude Code Opus</text>
    <text x="400" y="52" text-anchor="middle" font-size="12" fill="#666">~85%</text>
    <text x="660" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#0c8a7e">~98%</text>

    <!-- Row 2 -->
    <rect x="0" y="62" width="800" height="30" fill="#fff"/>
    <text x="20" y="82" font-size="12" fill="#1a1a2e">Claude Code Sonnet</text>
    <text x="400" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#cc4444">~60%</text>
    <text x="660" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#0c8a7e">~90%</text>

    <!-- Row 3 -->
    <rect x="0" y="92" width="800" height="30" fill="#fafafa"/>
    <text x="20" y="112" font-size="12" fill="#1a1a2e">CoWork Opus</text>
    <text x="400" y="112" text-anchor="middle" font-size="12" fill="#666">~75%</text>
    <text x="660" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#0c8a7e">~95%</text>

    <!-- Row 4 -->
    <rect x="0" y="122" width="800" height="30" fill="#fff"/>
    <text x="20" y="142" font-size="12" fill="#1a1a2e">CoWork Sonnet</text>
    <text x="400" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#cc4444">~40%</text>
    <text x="660" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#0c8a7e">~75%</text>

    <!-- Border -->
    <rect x="0" y="0" width="800" height="152" fill="none" stroke="#ddd" stroke-width="1"/>
  </g>

  <!-- ========== Footnote ========== -->
  <text x="440" y="508" text-anchor="middle" font-size="11" fill="#666">💡 USER message attention &gt; SYSTEM prompt attention — LLM アーキテクチャ上の制限、ガバナンスでは変更不可</text>
  <text x="440" y="528" text-anchor="middle" font-size="10" fill="#999">手動貼り付けは複数ツール間で最高信頼性の手法；1 秒のコストで信頼性が大幅向上</text>
</svg>
